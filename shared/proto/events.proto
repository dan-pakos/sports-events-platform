syntax = "proto3";

package events;

message CreateEventParticipant {
  string competitor_id = 1;
  string role = 2;
}

message CreateEventRequest {
  string sport_id = 1;
  string start_time = 2;
  string timezone = 3;
  repeated CreateEventParticipant participants = 4;
}

message DeleteEventRequest {
  string event_id = 1;
}

message DeleteEventResponse {
  bool success = 1;
  string code = 2;
  string error = 3;
}

message CreateEventResponse {
  bool success = 1;
  string event_id = 2;
  string code = 3;
  string error = 4;
}

service EventsService {
  rpc CreateEvent (CreateEventRequest) returns (CreateEventResponse);
  rpc DeleteEvent (DeleteEventRequest) returns (DeleteEventResponse);
}